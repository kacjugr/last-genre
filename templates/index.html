<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>User Recommendations Bot</title>
  <style>
    body { font-family: sans-serif; max-width: 1100px; margin: 2rem auto; padding: 0 1rem; color: #222; }
    h1 { font-size: 1.4rem; }
    form { display: grid; gap: 0.75rem; margin-bottom: 2rem; }
    label { font-weight: bold; display: block; margin-bottom: 0.25rem; }
    input, select { width: 100%; padding: 0.4rem; box-sizing: border-box; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    .error { background: #fde8e8; color: #9b1c1c; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem; }
    .section { margin-bottom: 2rem; }
    ol, ul { padding-left: 1.5rem; }
    table { border-collapse: collapse; width: 100%; }
    td, th { text-align: left; padding: 0.2rem 0.5rem; }
    pre { white-space: pre-wrap; background: #f5f5f5; padding: 1rem; border-radius: 4px; }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2.5rem; align-items: start; }
    .recs-panel { border-left: 1px solid #ddd; padding-left: 2rem; }
    .scroll-box { max-height: 14em; overflow-y: auto; border: 1px solid #ddd; border-radius: 4px; }
    .scroll-box table { width: 100%; border-collapse: collapse; }
    .scroll-box th { position: sticky; top: 0; background: #f5f5f5; box-shadow: 0 1px 0 #ddd; padding: 0.25rem 0.5rem; }
    .scroll-box td { padding: 0.2rem 0.5rem; }
    .service-toggle { display: inline-flex; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; margin-bottom: 1rem; }
    .service-toggle button { padding: 0.4rem 1rem; border: none; background: #f5f5f5; cursor: pointer; font: inherit; }
    .service-toggle button + button { border-left: 1px solid #ddd; }
    .service-toggle button.active { background: #222; color: #fff; }
    .radio-group { display: flex; flex-wrap: wrap; gap: 0.25rem 1rem; }
    .radio-group label { font-weight: normal; display: inline-flex; align-items: center; gap: 0.3rem; width: auto; }
    .source-label { margin: 0 0 0.5rem; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.05em; color: #888; }
    .col-r { text-align: right; }
    .col-rank { text-align: right; width: 2rem; }
    .scroll-box tbody td.col-rank { color: #888; }
    #chart-tags-list tbody tr, #tag-counts-list tbody tr { cursor: pointer; }
    #chart-tags-list tbody tr:hover, #tag-counts-list tbody tr:hover { background: #f0f4ff; }
    @media (max-width: 720px) {
      .results-grid { grid-template-columns: 1fr; }
      .recs-panel { border-left: none; padding-left: 0; border-top: 1px solid #ddd; padding-top: 1.5rem; }
    }
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.55);
      display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 1rem;
    }
    .modal-box {
      position: relative; background: #fff; width: min(560px, 100%); min-height: 320px;
      max-height: 80vh; box-sizing: border-box; padding: 2.5rem 3.5rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      clip-path: polygon(18px 0, calc(100% - 18px) 0, 100% 18px, 100% calc(100% - 18px),
        calc(100% - 18px) 100%, 18px 100%, 0 calc(100% - 18px), 0 18px);
      display: flex; flex-direction: column;
    }
    .modal-close {
      position: absolute; top: 0.5rem; right: 0.75rem; background: none; border: none;
      font-size: 1.4rem; line-height: 1; color: #888; cursor: pointer; padding: 0.25rem;
      z-index: 1;
    }
    .modal-close:hover { color: #222; }
    .modal-arrow {
      position: absolute; top: 0; bottom: 0; width: 3rem; border: none; background: none;
      font-size: 1.8rem; font-weight: bold; color: #999; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-arrow:hover:not(:disabled) { color: #222; }
    .modal-arrow:disabled { opacity: 0.2; cursor: default; }
    .modal-arrow-left { left: 0; }
    .modal-arrow-right { right: 0; }
    .modal-content { flex: 1; overflow-y: auto; }
    .modal-content pre { white-space: pre-wrap; word-break: break-word; }
    .modal-page-indicator { text-align: center; font-size: 0.75rem; color: #888; margin-top: 1rem; }
    .modal-artist-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.75rem; }
    .modal-artist-thumb { width: 48px; height: 48px; border-radius: 4px; object-fit: cover; flex-shrink: 0; }
    .modal-artist-name { margin: 0; font-size: 1.2rem; font-weight: bold; }
    .modal-album-table { width: 100%; border-collapse: collapse; margin-top: 1rem; table-layout: fixed; }
    .modal-album-table td { vertical-align: top; padding: 0.5rem 0.5rem 0.5rem 0; border-top: 1px solid #eee; overflow-wrap: break-word; }
    .modal-album-art { width: 40px; }
    .modal-album-art img { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; display: block; }
    .modal-album-title { width: 35%; }
    .modal-album-title h4 { margin: 0; font-size: 1rem; font-weight: bold; }
    .modal-album-tracks ul { margin: 0; padding-left: 1.1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>User's Top Artists</h1>

  <div class="results-grid" id="results-grid">
    <div>
      <div class="service-toggle" id="service-toggle" role="group" aria-label="Data source" data-spotify-connected="{{ 'true' if spotify_connected else 'false' }}">
        <button type="button" class="active" data-service="lastfm">Last.fm</button>
        <button type="button" data-service="spotify">Spotify</button>
      </div>
      <div id="fetch-error" class="error" style="display:none;"></div>
      <div id="spotify-error" class="error"{% if not spotify_error %} style="display:none;"{% endif %}>{{ spotify_error or '' }}</div>
      <div id="spotify-connect" style="display:none;">
        <p>Connect your Spotify account to fetch your top artists.</p>
        <a href="/spotify/login"><button type="button">Connect Spotify</button></a>
      </div>
      <div id="spotify-disconnect" style="display:none; margin-bottom: 0.75rem;">
        <button type="button" id="spotify-disconnect-btn">Disconnect Spotify</button>
      </div>
      <form id="fetch-form">
        <div id="lastfm-fields">
          <div>
            <label for="username">Last.fm username</label>
            <input type="text" id="username" name="username" value="{{ form.username }}" required>
          </div>
          <div>
            <label for="period">Period</label>
            <select id="period" name="period">
              {% for choice in lastfm_period_choices %}
                <option value="{{ choice }}" {% if choice == form.period %}selected{% endif %}>{{ choice }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div id="spotify-fields" style="display:none;">
          <div>
            <label for="time_range">Time range</label>
            <select id="time_range" name="time_range">
              {% for choice in spotify_time_range_choices %}
                <option value="{{ choice }}" {% if choice == 'long_term' %}selected{% endif %}>{{ choice }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div>
          <label>Number of artists</label>
          <div class="radio-group" id="limit-group">
            {% for choice in limit_choices %}
              <label><input type="radio" name="limit" value="{{ choice }}" {% if choice == form.limit %}checked{% endif %}> {{ choice }}</label>
            {% endfor %}
          </div>
        </div>
        <button type="submit" id="fetch-btn">Fetch</button>
      </form>
      <div id="results-left"></div>
    </div>
    <div class="section recs-panel">
      <p class="source-label">Last.fm Genre Tags</p>
      <h2>Global Top Tags</h2>
      <p id="chart-tags-status" style="display:none;"></p>
      <div id="chart-tags-list" style="display:none;"></div>

      <h2>Tag frequency across your artists</h2>
      <p id="tag-counts-status" style="display:none;"></p>
      <div id="tag-counts-list"></div>

      <hr style="margin: 1.5rem 0; border: none; border-top: 1px solid #ddd;">
      <h2>Genre Recommendations</h2>
      <div style="display: grid; gap: 0.75rem; margin-bottom: 1rem;">
        <div>
          <label for="genre">Genre to explore</label>
          <input type="text" id="genre" placeholder="e.g. jazz">
        </div>
        <div>
          <button id="gemini-btn" type="button">Get Recommendations</button>
        </div>
      </div>
      <p id="gemini-status" style="display:none;"></p>
      <pre id="gemini-reply" style="display:none;"></pre>
      <button id="gemini-view-btn" type="button" style="display:none; margin-top: 0.75rem;">View Recommendations</button>
    </div>
  </div>

  <div class="modal-overlay" id="gemini-modal-overlay" style="display:none;">
    <div class="modal-box">
      <button type="button" class="modal-close" id="modal-close" aria-label="Close">&times;</button>
      <button type="button" class="modal-arrow modal-arrow-left" id="modal-prev" aria-label="Previous">&lt;</button>
      <div class="modal-content" id="modal-content"></div>
      <button type="button" class="modal-arrow modal-arrow-right" id="modal-next" aria-label="Next">&gt;</button>
      <p class="modal-page-indicator" id="modal-page-indicator"></p>
    </div>
  </div>

  <script type="module">
    import { loadCache, saveCache, load_artist_tags_cache, save_artist_tags_cache } from "{{ url_for('static', filename='js/cache.js') }}";
    import { splitGeminiReply } from "{{ url_for('static', filename='js/gemini.js') }}";

    // lastfm.js and spotify.js are self-registering plugin modules: importing
    // them for their side effects (no named bindings needed) is what wires
    // their form-value/fetch/cache-key functions into the shared registries
    // below. See static/js/registries.js for the full registration contract
    // and how to add another service without touching this file.
    import "{{ url_for('static', filename='js/lastfm.js') }}";
    // fetchArtwork isn't part of the registries above — it's Spotify's own catalog
    // search for Gemini-recommendation artist/album images, called directly.
    import { fetchArtwork } from "{{ url_for('static', filename='js/spotify.js') }}";
    import { formValueGetters, fetchTopArtistsFns, cacheKeyBuilders } from "{{ url_for('static', filename='js/registries.js') }}";

    (function () {
      var SERVICE_KEY = 'lastgenre_v1_service';
      var currentArtists = [];
      // Full (up to max-limit) artist list + its identifying params for the service currently on screen.
      // Changing the limit radio just re-slices this instead of re-fetching.
      var currentFullArtists = null;
      var currentMeta = null;
      var fetchInFlight = false;
      var serviceToggle = document.getElementById('service-toggle');
      var spotifyConnected = serviceToggle.dataset.spotifyConnected === 'true';
      var selectedService = (localStorage.getItem(SERVICE_KEY) === 'spotify') ? 'spotify' : 'lastfm';

      function updateServiceUI() {
        var isSpotify = selectedService === 'spotify';
        serviceToggle.querySelectorAll('button').forEach(function (b) {
          b.classList.toggle('active', b.dataset.service === selectedService);
        });
        document.getElementById('lastfm-fields').style.display = isSpotify ? 'none' : '';
        document.getElementById('spotify-fields').style.display = isSpotify ? '' : 'none';
        document.getElementById('username').required = !isSpotify;

        var needsConnect = isSpotify && !spotifyConnected;
        document.getElementById('spotify-connect').style.display = needsConnect ? 'block' : 'none';
        document.getElementById('spotify-disconnect').style.display = (isSpotify && spotifyConnected) ? 'block' : 'none';
        document.getElementById('fetch-form').style.display = needsConnect ? 'none' : '';

        document.getElementById('fetch-error').style.display = 'none';
        updateFetchButton();
      }

      document.getElementById('spotify-disconnect-btn').addEventListener('click', function () {
        try {
          Object.keys(localStorage).forEach(function (k) {
            if (k.indexOf('spotify_v1_') === 0) localStorage.removeItem(k);
          });
        } catch (e) {}
        window.location.href = '/spotify/logout';
      });

      serviceToggle.addEventListener('click', function (e) {
        var btn = e.target.closest('button[data-service]');
        if (!btn || btn.classList.contains('active')) return;
        selectedService = btn.dataset.service;
        try { localStorage.setItem(SERVICE_KEY, selectedService); } catch (e) {}
        document.getElementById('spotify-error').style.display = 'none';
        updateServiceUI();
        if (selectedService === 'spotify') {
          applySpotifyCache();
        } else {
          applyLastFMCache();
        }
      });

      updateServiceUI();

      function getMaxLimit() {
        var vals = Array.prototype.map.call(document.querySelectorAll('input[name="limit"]'), function (el) {
          return parseInt(el.value, 10);
        });
        return vals.length ? Math.max.apply(null, vals) : 500;
      }

      // The cache key for whatever username/period (or time_range) is currently selected in the
      // form — each such key carries its own fetchedAt, since different periods are fetched
      // independently and can go stale at different times. cacheKeyBuilders comes from
      // registries.js, populated by lastfm.js/spotify.js self-registering.
      function getCurrentCacheKey() {
        var v = getFetchFormValues();
        if (selectedService === 'lastfm' && !v.username) return null;
        return cacheKeyBuilders[selectedService](v);
      }

      function ageString(fetchedAt) {
        var secs = Math.floor((Date.now() - fetchedAt) / 1000);
        if (secs < 60) return secs + 's ago';
        var mins = Math.floor(secs / 60);
        if (mins < 60) return mins + 'm ago';
        var hrs = Math.floor(mins / 60);
        if (hrs < 24) return hrs + 'h ago';
        return Math.floor(hrs / 24) + 'd ago';
      }

      // Button reflects the fetchedAt of the cache entry for the currently selected
      // username/period (or time_range), not a single timestamp for the whole service.
      // Also disabled whenever there's no username to fetch for (Last.fm only — Spotify
      // identity comes from the OAuth session), and left alone mid-fetch.
      function updateFetchButton() {
        var btn = document.getElementById('fetch-btn');
        if (fetchInFlight) {
          btn.disabled = true;
          btn.textContent = 'Fetching…';
          return;
        }
        var key = getCurrentCacheKey();
        var entry = key ? loadCache(key) : null;
        if (entry && entry.fetchedAt) {
          btn.textContent = 'Refresh (' + ageString(entry.fetchedAt) + ')';
        } else {
          btn.textContent = 'Fetch';
        }
        btn.disabled = selectedService === 'lastfm' && !document.getElementById('username').value.trim();
      }

      function esc(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      // cols: [{label, cls?}]  rows: array of cell-value arrays (pre-escaped)
      function makeTable(cols, rows) {
        var ths = cols.map(function (c) {
          return '<th' + (c.cls ? ' class="' + c.cls + '"' : '') + '>' + c.label + '</th>';
        }).join('');
        var trs = rows.map(function (cells) {
          return '<tr>' + cells.map(function (cell, j) {
            return '<td' + (cols[j].cls ? ' class="' + cols[j].cls + '"' : '') + '>' + cell + '</td>';
          }).join('') + '</tr>';
        }).join('');
        return '<div class="scroll-box"><table><thead><tr>' + ths + '</tr></thead><tbody>' + trs + '</tbody></table></div>';
      }

      function renderArtists(allArtists, limit, username, period) {
        var artists = allArtists.slice(0, limit);
        currentArtists = artists.map(function (a) { return a.name; });
        var cols, rows;
        if (selectedService === 'spotify') {
          // Spotify's /fetch-spotify-artists only returns { name }, no play counts.
          cols = [{label: '#', cls: 'col-rank'}, {label: 'Artist'}];
          rows = artists.map(function (a, i) { return [i + 1, esc(a.name)]; });
        } else {
          cols = [{label: '#', cls: 'col-rank'}, {label: 'Artist'}, {label: 'Plays', cls: 'col-r'}];
          rows = artists.map(function (a, i) { return [i + 1, esc(a.name), a.playcount]; });
        }
        document.getElementById('results-left').innerHTML =
          '<div class="section"><h2>Top ' + artists.length + ' artists for ' +
          esc(username) + ' (' + esc(period) + ')</h2>' + makeTable(cols, rows) + '</div>';
        document.getElementById('gemini-status').style.display = 'none';
        document.getElementById('gemini-reply').style.display = 'none';
        document.getElementById('gemini-reply').textContent = '';
        document.getElementById('gemini-view-btn').style.display = 'none';
        fetchTagCounts(currentArtists);
      }

      // Re-renders from the already-loaded full artist list at the currently selected limit —
      // used when only the limit radio changes, so no network round-trip is needed.
      function renderFromCache() {
        if (!currentFullArtists || !currentMeta) return;
        var limit = getLimit();
        renderArtists(currentFullArtists, limit, currentMeta.username, currentMeta.period);
      }

      function renderTagCounts(tag_counts) {
        var el = document.getElementById('tag-counts-list');
        if (!el) return;
        if (!tag_counts || !tag_counts.length) { el.innerHTML = ''; return; }
        var cols = [{label: '#', cls: 'col-rank'}, {label: 'Tag'}, {label: 'Count', cls: 'col-r'}];
        var rows = tag_counts.map(function (pair, i) { return [i + 1, esc(pair[0]), pair[1]]; });
        el.innerHTML = '<div class="section">' +
          makeTable(cols, rows) + '</div>';
      }

      function mergeTagCounts(tagLists) {
        var counts = {};
        var order = [];
        tagLists.forEach(function (tags) {
          (tags || []).forEach(function (t) {
            if (!(t in counts)) { counts[t] = 0; order.push(t); }
            counts[t] += 1;
          });
        });
        return order.map(function (t) { return [t, counts[t]]; })
          .sort(function (a, b) { return b[1] - a[1]; });
      }

      function fetchTagCounts(artistNames) {
        var statusEl = document.getElementById('tag-counts-status');
        var runningTagLists = [];
        var uncachedNames = [];

        artistNames.forEach(function (name) {
          var entry = load_artist_tags_cache(name);
          if (entry && entry.tags) {
            runningTagLists.push(entry.tags);
          } else {
            uncachedNames.push(name);
          }
        });
        renderTagCounts(mergeTagCounts(runningTagLists));

        if (!uncachedNames.length) {
          statusEl.style.display = 'none';
          return;
        }

        statusEl.textContent = 'Fetching tags…';
        statusEl.style.display = 'block';

        fetch('/fetch-tag-counts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ artist_names: uncachedNames }),
        })
          .then(function (res) {
            if (!res.ok) {
              return res.text().then(function (body) {
                try { body = JSON.parse(body).error || body; } catch (e) {}
                statusEl.textContent = 'Tag frequency error: ' + body;
              });
            }
            var reader = res.body.getReader();
            var decoder = new TextDecoder();
            var buffer = '';

            function read() {
              reader.read().then(function (chunk) {
                if (chunk.done) {
                  statusEl.style.display = 'none';
                  return;
                }
                buffer += decoder.decode(chunk.value, { stream: true });
                var lines = buffer.split('\n');
                buffer = lines.pop();
                lines.forEach(function (line) {
                  if (line.slice(0, 6) !== 'data: ') return;
                  try {
                    var ev = JSON.parse(line.slice(6));
                    statusEl.textContent = 'Fetching tags for ' + ev.artist + '…';
                    save_artist_tags_cache(ev.artist, ev.tags);
                    runningTagLists.push(ev.tags);
                    renderTagCounts(mergeTagCounts(runningTagLists));
                  } catch (e) {}
                });
                read();
              });
            }
            read();
          })
          .catch(function (err) {
            statusEl.textContent = 'Tag frequency error: ' + err;
          });
      }

      function getLimit() {
        var checked = document.querySelector('input[name="limit"]:checked');
        return checked ? parseInt(checked.value, 10) : 50;
      }

      function applyLastFMCache() {
        if (selectedService !== 'lastfm') return;
        var v = formValueGetters.lastfm();
        if (!v.username) {
          currentFullArtists = null;
          currentMeta = null;
          document.getElementById('results-left').innerHTML = '';
          updateFetchButton();
          return;
        }
        var key = cacheKeyBuilders.lastfm(v);
        var entry = loadCache(key);
        if (entry && entry.artists) {
          currentFullArtists = entry.artists;
          currentMeta = { username: v.username, period: v.period };
          renderFromCache();
        } else {
          currentFullArtists = null;
          currentMeta = null;
          document.getElementById('results-left').innerHTML = '';
        }
        updateFetchButton();
      }

      function applySpotifyCache() {
        if (selectedService !== 'spotify') return;
        var v = formValueGetters.spotify();
        var key = cacheKeyBuilders.spotify(v);
        var entry = loadCache(key);
        if (entry && entry.artists) {
          currentFullArtists = entry.artists;
          currentMeta = { username: entry.display_name, period: v.timeRange };
          renderFromCache();
        } else {
          currentFullArtists = null;
          currentMeta = null;
          document.getElementById('results-left').innerHTML = '';
        }
        updateFetchButton();
      }

      // Restore cache on page load
      applyLastFMCache();
      applySpotifyCache();

      // Refresh button label every 30s so the age stays current
      setInterval(updateFetchButton, 30000);

      // Update button when form values change
      ['username', 'period'].forEach(function (id) {
        document.getElementById(id).addEventListener('change', applyLastFMCache);
      });
      document.getElementById('username').addEventListener('input', applyLastFMCache);

      // Limit only changes what's displayed, not what's fetched — re-slice the cached full list.
      document.getElementById('limit-group').addEventListener('change', renderFromCache);
      // Time range is a real dimension of the data, so it needs its own cache lookup.
      document.getElementById('time_range').addEventListener('change', applySpotifyCache);


      function startFetch()
      {
        fetchInFlight = true;
        updateFetchButton();
        var errEl = document.getElementById('fetch-error');
        errEl.style.display = 'none';
      }

      // Common end-of-fetch bookkeeping: clears the in-flight flag, shows/hides the error
      // message, and refreshes the fetch button. Pass an error message on failure, or
      // nothing on success.
      function finishFetch(errorMessage) {
        fetchInFlight = false;
        var errEl = document.getElementById('fetch-error');
        if (errorMessage) {
          errEl.textContent = errorMessage;
          errEl.style.display = 'block';
        } else {
          errEl.style.display = 'none';
        }
        updateFetchButton();
      }

      // formValueGetters/fetchTopArtistsFns come from registries.js, populated by
      // lastfm.js/spotify.js self-registering — adding a service means writing a new
      // module like those, not touching this dispatch logic.
      function getFetchFormValues() {
        return formValueGetters[selectedService]();
      }

      function fetchArtists() {
        startFetch();
        var v = getFetchFormValues();

        fetchTopArtistsFns[selectedService](getMaxLimit(), v)
          .then(function (data) {
            if (data.error) {
              if (data.needs_auth) {
                spotifyConnected = false;
                updateServiceUI();
              }
              finishFetch(data.error);
              return;
            }
            var now = Date.now();
            if (selectedService === 'spotify') {
              var key = cacheKeyBuilders.spotify(v);
              saveCache(key, { artists: data.artists, display_name: data.display_name, fetchedAt: now });
              currentFullArtists = data.artists;
              currentMeta = { username: data.display_name, period: v.timeRange };
            } else {
              var key = cacheKeyBuilders.lastfm(v);
              saveCache(key, { artists: data.artists, fetchedAt: now });
              currentFullArtists = data.artists;
              currentMeta = { username: v.username, period: v.period };
            }
            renderFromCache();
            finishFetch();
          })
          .catch(function (err) {
            finishFetch('Error fetching artists: ' + err);
          });
      }

      // Form submit → fetch fresh data from server
      document.getElementById('fetch-form').addEventListener('submit', function (e) {
        e.preventDefault();
        fetchArtists();
      });

      // Gemini fetch
      var genreInput = document.getElementById('genre');
      var geminiBtn = document.getElementById('gemini-btn');
      var statusEl = document.getElementById('gemini-status');
      var replyEl = document.getElementById('gemini-reply');
      var currentGeminiRecommendations = null; // parsed JSON portion of the last Gemini reply, for later use
      var currentGeminiText = null; // plain-text portion of the last Gemini reply, for later use
      var currentGeminiArtwork = null; // Spotify artist/album images, same order/index as currentGeminiRecommendations

      // Same album-shape normalization as spotify.py's _normalize_albums, so a raw
      // recommendation's albums line up by index with currentGeminiArtwork[i].albums.
      // The prompt asks Gemini for 'albums'/'tracks', but tolerate the 'recommended_*'
      // names it's used before, in case a reply still comes back that way.
      function normalizeAlbums(artist) {
        if (Array.isArray(artist.albums)) return artist.albums;
        if (Array.isArray(artist.recommended_albums)) return artist.recommended_albums;
        if (artist.album && typeof artist.album === 'object') return [artist.album];
        return [];
      }

      function getAlbumTracks(album) {
        if (Array.isArray(album.tracks)) return album.tracks;
        if (Array.isArray(album.recommended_tracks)) return album.recommended_tracks;
        return [];
      }

      // Recommendations modal — page 0 is the prose intro, pages 1..n are artist entries
      var modalOverlay = document.getElementById('gemini-modal-overlay');
      var modalContent = document.getElementById('modal-content');
      var modalPrev = document.getElementById('modal-prev');
      var modalNext = document.getElementById('modal-next');
      var modalPageIndicator = document.getElementById('modal-page-indicator');
      var modalClose = document.getElementById('modal-close');
      var geminiViewBtn = document.getElementById('gemini-view-btn');
      var modalPage = 0;

      // artist page: a header row (Spotify artist image + bolded name), then a table of
      // recommended albums — album art, album title, recommended track names.
      function renderArtistPage(artist, artwork) {
        var html = '<div class="modal-artist-header">';
        if (artwork && artwork.image) {
          html += '<img class="modal-artist-thumb" src="' + esc(artwork.image) + '" alt="">';
        }
        html += '<h3 class="modal-artist-name">' + esc(artist.name || '') + '</h3></div>';

        if (artist.description) html += '<p>' + esc(artist.description) + '</p>';
        if (artist.fit) html += '<p><em>' + esc(artist.fit) + '</em></p>';

        var albums = normalizeAlbums(artist);
        var artworkAlbums = (artwork && Array.isArray(artwork.albums)) ? artwork.albums : [];
        if (albums.length) {
          html += '<table class="modal-album-table"><tbody>';
          albums.forEach(function (album, i) {
            var albumImage = artworkAlbums[i] && artworkAlbums[i].image;
            var tracks = getAlbumTracks(album);
            html += '<tr>' +
              '<td class="modal-album-art">' + (albumImage ? '<img src="' + esc(albumImage) + '" alt="">' : '') + '</td>' +
              '<td class="modal-album-title"><h4>' + esc(album.title || '') + '</h4></td>' +
              '<td class="modal-album-tracks">' +
                (tracks.length
                  ? '<ul>' + tracks.map(function (t) { return '<li>' + esc((t && t.title) || '') + '</li>'; }).join('') + '</ul>'
                  : '') +
              '</td></tr>';
          });
          html += '</tbody></table>';
        }
        return html;
      }

      function renderModalPage() {
        var artists = (currentGeminiRecommendations && Array.isArray(currentGeminiRecommendations)) ? currentGeminiRecommendations : [];
        var pageCount = 1 + artists.length;

        if (modalPage === 0) {
          modalContent.innerHTML = '<p>' + esc(currentGeminiText || '').replace(/\n+/g, '</p><p>') + '</p>';
        } else {
          var artist = artists[modalPage - 1];
          var artwork = currentGeminiArtwork && currentGeminiArtwork[modalPage - 1];
          modalContent.innerHTML = renderArtistPage(artist, artwork);
        }

        modalPrev.disabled = modalPage === 0;
        modalNext.disabled = modalPage === pageCount - 1;
        modalPageIndicator.textContent = (modalPage + 1) + ' / ' + pageCount;
      }

      function openGeminiModal() {
        modalPage = 0;
        renderModalPage();
        modalOverlay.style.display = 'flex';
      }

      function closeGeminiModal() {
        modalOverlay.style.display = 'none';
      }

      modalPrev.addEventListener('click', function () {
        if (modalPage > 0) { modalPage -= 1; renderModalPage(); }
      });
      modalNext.addEventListener('click', function () {
        var artists = (currentGeminiRecommendations && Array.isArray(currentGeminiRecommendations)) ? currentGeminiRecommendations : [];
        if (modalPage < artists.length) { modalPage += 1; renderModalPage(); }
      });
      modalClose.addEventListener('click', closeGeminiModal);
      modalOverlay.addEventListener('click', function (e) {
        if (e.target === modalOverlay) closeGeminiModal();
      });
      document.addEventListener('keydown', function (e) {
        if (modalOverlay.style.display === 'none') return;
        if (e.key === 'Escape') closeGeminiModal();
        if (e.key === 'ArrowLeft') modalPrev.click();
        if (e.key === 'ArrowRight') modalNext.click();
      });
      geminiViewBtn.addEventListener('click', openGeminiModal);

      // Global chart top tags — loaded automatically on page load
      var CHART_TAGS_KEY = 'lastfm_v1_chart_tags';
      var CHART_TAGS_TTL = 60 * 1000;
      var chartTagsStatus = document.getElementById('chart-tags-status');
      var chartTagsList = document.getElementById('chart-tags-list');

      function onTagRowClick(e) {
        var row = e.target.closest('tr');
        if (!row || row.closest('thead')) return;
        var cells = row.querySelectorAll('td');
        if (cells[1]) document.getElementById('genre').value = cells[1].textContent;
      }

      chartTagsList.addEventListener('click', onTagRowClick);
      document.getElementById('tag-counts-list').addEventListener('click', onTagRowClick);

      function renderChartTags(tags) {
        var cols = [{label: '#', cls: 'col-rank'}, {label: 'Tag'}, {label: 'Count', cls: 'col-r'}];
        var rows = tags.map(function (tag, i) { return [i + 1, esc(tag.name), Number(tag.count).toLocaleString()]; });
        chartTagsList.innerHTML = makeTable(cols, rows);
        chartTagsList.style.display = 'block';
        chartTagsStatus.style.display = 'none';
      }

      function fetchChartTags() {
        chartTagsStatus.textContent = 'Loading…';
        chartTagsStatus.style.display = 'block';

        fetch('/chart-top-tags')
          .then(function (res) { return res.json(); })
          .then(function (data) {
            if (data.error) {
              chartTagsStatus.textContent = 'Error: ' + data.error;
              return;
            }
            try {
              localStorage.setItem(CHART_TAGS_KEY, JSON.stringify({ tags: data.tags, fetchedAt: Date.now() }));
            } catch (e) {}
            renderChartTags(data.tags);
          })
          .catch(function (err) {
            chartTagsStatus.textContent = 'Error: ' + err;
          });
      }

      (function () {
        try {
          var raw = localStorage.getItem(CHART_TAGS_KEY);
          if (raw) {
            var cached = JSON.parse(raw);
            if (Date.now() - cached.fetchedAt < CHART_TAGS_TTL) {
              renderChartTags(cached.tags);
              return;
            }
          }
        } catch (e) {}
        fetchChartTags();
      })();

      geminiBtn.addEventListener('click', function () {
        var genre = genreInput.value.trim();
        if (!genre) { genreInput.focus(); return; }
        if (!currentArtists.length) return;

        geminiBtn.disabled = true;
        statusEl.textContent = 'Asking Gemini…';
        statusEl.style.display = 'block';
        replyEl.style.display = 'none';
        replyEl.textContent = '';
        geminiViewBtn.style.display = 'none';

        fetch('/gemini', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ genre: genre, artists: currentArtists }),
        })
          .then(function (res) {
            var reader = res.body.getReader();
            var decoder = new TextDecoder();
            var buffer = '';

            function handleEvent(ev) {
              switch (ev.type) {
                case 'trying':
                  statusEl.textContent = 'Asking Gemini… (attempt ' + ev.attempt + ')';
                  break;
                case 'waiting':
                  statusEl.textContent = 'Gemini busy — retrying in ' + ev.remaining + 's…';
                  break;
                case 'trying_fallback':
                  statusEl.textContent = 'Trying backup model…';
                  break;
                case 'done':
                  geminiBtn.disabled = false;
                  if (ev.fallback) {
                    statusEl.textContent =
                      "Gemini's main model was busy after " + ev.retries +
                      (ev.retries === 1 ? ' retry' : ' retries') +
                      ', so the backup model answered instead:';
                  } else if (ev.retries > 0) {
                    statusEl.textContent =
                      'Gemini was busy, but responded after ' + ev.retries +
                      (ev.retries === 1 ? ' retry' : ' retries') + ':';
                  } else {
                    statusEl.style.display = 'none';
                  }
                  var parts = splitGeminiReply(ev.reply);
                  currentGeminiRecommendations = parts.json;
                  currentGeminiText = parts.text;
                  console.log('Gemini JSON portion:', currentGeminiRecommendations);
                  replyEl.textContent = parts.text;
                  replyEl.style.display = 'block';
                  currentGeminiArtwork = null;
                  geminiViewBtn.style.display =
                    (Array.isArray(currentGeminiRecommendations) && currentGeminiRecommendations.length) ? 'inline-block' : 'none';
                  if (Array.isArray(currentGeminiRecommendations) && currentGeminiRecommendations.length) {
                    fetchArtwork(currentGeminiRecommendations)
                      .then(function (artworkData) {
                        currentGeminiArtwork = artworkData.artwork || null;
                        renderModalPage(); // no-op if the modal isn't showing an artist page yet
                      })
                      .catch(function () { /* artwork is enrichment, not critical — leave images blank */ });
                  }
                  break;
                case 'busy':
                  geminiBtn.disabled = false;
                  statusEl.textContent = 'Gemini is busy right now. Please try again in a bit.';
                  break;
                case 'error':
                  geminiBtn.disabled = false;
                  statusEl.textContent = 'Error: ' + ev.message;
                  break;
              }
            }

            function read() {
              reader.read().then(function (chunk) {
                if (chunk.done) return;
                buffer += decoder.decode(chunk.value, { stream: true });
                var lines = buffer.split('\n');
                buffer = lines.pop();
                lines.forEach(function (line) {
                  if (line.slice(0, 6) === 'data: ') {
                    try { handleEvent(JSON.parse(line.slice(6))); } catch (e) {}
                  }
                });
                read();
              });
            }
            read();
          })
          .catch(function (err) {
            geminiBtn.disabled = false;
            statusEl.textContent = 'Error contacting Gemini: ' + err;
          });
      });
    })();
  </script>
</body>
</html>
